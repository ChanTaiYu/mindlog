name: mindlog
description: "MindLog — a private journal, mood tracker and task planner with local-first encryption."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Encrypted local persistence (AES-256 SQLite)
  sqflite_sqlcipher: ^3.1.0
  path: ^1.9.0
  path_provider: ^2.1.4

  # Security: Keystore-backed secrets + PBKDF2 key derivation
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5

  # Sensors / APIs
  local_auth: ^2.3.0          # biometric sensor
  image_picker: ^1.1.2        # camera / gallery sensor
  http: ^1.2.2                # quotes REST API

  # Notifications (daily reminder)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Charts & formatting
  fl_chart: ^0.69.0
  intl: ^0.19.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
